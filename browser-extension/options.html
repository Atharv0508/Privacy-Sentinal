<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Sentinel Settings</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        margin: 24px;
        color: #1c2b2a;
        background: #f5faf9;
      }

      .panel {
        background: #fff;
        border: 1px solid #d7e5e2;
        border-radius: 12px;
        padding: 16px;
        max-width: 780px;
      }

      h1 {
        margin-top: 0;
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #bdd4d0;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        background: #0a7e74;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        margin: 10px 0;
        color: #476664;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .secondary-btn {
        background: #e8f2f0;
        color: #184844;
      }

      .danger-btn {
        background: #b53a3a;
      }

      .small-btn {
        padding: 7px 10px;
        font-size: 0.86rem;
      }

      th,
      td {
        border-bottom: 1px solid #e2ecea;
        text-align: left;
        padding: 8px;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Privacy Sentinel Settings</h1>

      <label for="backendUrl">Backend API URL</label>
      <input id="backendUrl" type="url" placeholder="http://127.0.0.1:8000" />
      <button id="saveBtn">Save Settings</button>
      <p id="status" class="status"></p>

      <h2>Recent Reports</h2>
      <table>
        <thead>
          <tr>
            <th>Site</th>
            <th>Risk</th>
            <th>Severity</th>
            <th>Signals</th>
            <th>Actions</th>
            <th>Scanned At</th>
          </tr>
        </thead>
        <tbody id="reportsBody"></tbody>
      </table>
    </div>

    <script src="options.js"></script>
  </body>
</html>
